model:
  name: geonexus_rsd
  type: geonexus
  image_size: 256
  embedding_dim: 256
  backbone_dim: 256
  grid_size: 8
  alignment_weight: 0.35
  fusion_weight: 0.65
  use_class_offsets: true
  hierarchy_smoothing_lambda: 0.15
  use_scene_adapter: true
  use_router: true
  router_hidden_dim: 128
  innovations:
    scene_adapter:
      enabled: true
    router:
      enabled: true
      hidden_dim: 128
    scene_temperature:
      enabled: false
      hidden_dim: 128
      min_tau: 0.75
      max_tau: 1.50

criterion:
  cls_weight: 1.0
  box_weight: 2.0
  hierarchy_weight: 0.10
  focal_alpha: 0.25
  focal_gamma: 2.0
  margin_weight: 0.0
  margin_value: 0.2

pseudo_label:
  score_threshold: 0.55
  semantic_threshold: 0.50
  scene_threshold: 0.40
  hierarchy_bonus: 0.10
  negative_penalty: 0.15
  final_threshold: 0.60
